async function loadOv(){try{const r=await window.storage.get('ir_overrides',true);return r?JSON.parse(r.value):{};}catch(e){return {};}}

async function loadVendors(){try{const r=await window.storage.get('ir_vendors',true);return r?JSON.parse(r.value):[];}catch(e){return [];}}

function getCatCfg(cat){return CAT_CFG[cat]||{icon:'📦',label:cat};}
function filtered(){if(S.activeCat==='all')return PRODUCTS_RAW;return PRODUCTS_RAW.filter(p=>p.cat===S.activeCat);}

function slugify(n){return n.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');}

function buildWAMsg(p){
  const price=getPrice(p);
  const stock=isInStock(p)?'✅ En Stock':'❌ Agotado';
  const cfg=getCatCfg(p.cat);
  const priceStr=price==='CONSULTAR'?'💬 Precio a consultar':`💰 $${Number(price).toLocaleString()} USD`;
  return encodeURIComponent(`🏪 *${STORE_NAME}*\n\n*${p.name}*\n${cfg.icon} ${cfg.label}\n${priceStr}\n${stock}\n\n_¿Te interesa? Escribinos para más info._`);
}

function shareWA(id){
  const p=PRODUCTS_RAW.find(x=>x.id===id);if(!p)return;
  const msg=buildWAMsg(p);
  const wa=getVendorWA();
  window.open(wa?`https://wa.me/${wa.replace(/\D/g,'')}?text=${msg}`:`https://wa.me/?text=${msg}`,'_blank');
}

  const app=document.getElementById('app');

  renderMain(app);
}

function tryVendorPass(){

  if(val===VENDOR_PASS){st({loginStep:'vendor-select'});}
  else notify('Contraseña incorrecta','error');
}

function loginVendor(id){

  st({role:'vendor',vendor:id,screen:'catalog',loginStep:null});
  notify(`Bienvenido/a, ${v?.name||''}! 👋`);
}

function tryAdmin(){

function carouselNav(pid,dir){
  const card=document.querySelector(`[data-ci-${pid}]`);
  if(!card)return;
  const imgs=((S.overrides[pid]||{}).images||[]).filter(u=>u.trim());
  if(imgs.length<2)return;
  let idx=(parseInt(card.getAttribute('data-ci-'+pid)||0)+dir+imgs.length)%imgs.length;
  card.setAttribute('data-ci-'+pid,idx);
  const img=document.getElementById('car'+pid+'img');
  if(img){img.src=imgs[idx];img.style.display='';}
  document.getElementById('car'+pid+'ph').style.display='none';
  imgs.forEach((_,i)=>{const d=document.getElementById('car'+pid+'d'+i);if(d)d.className='carousel-dot'+(i===idx?' active':'');});
}

function renderModal(){
  if(S.modal==='view')    return renderViewModal();
  if(S.modal==='product') return renderProductModal();
  if(S.modal==='admin')   return renderAdminModal();
  return '';
}

function openProductView(id){
  st({modal:'view', viewId:id, viewImg:0});
}

function viewSetImg(idx){
  S.viewImg=idx;
  // update without full re-render
  const main=document.getElementById('pmodal-main');
  const imgs=((S.overrides[S.viewId]||{}).images||[]).filter(u=>u);
  const cfg=getCatCfg((PRODUCTS_RAW.find(p=>p.id===S.viewId)||{}).cat||'');
  const ov=S.overrides[S.viewId]||{};
  if(main){
    if(imgs.length>0){
      main.innerHTML=`<img src="${imgs[idx]}" onerror="this.style.display='none'">`;
    }
  }
  document.querySelectorAll('.pmodal-thumb').forEach((t,i)=>{
    t.className='pmodal-thumb'+(i===idx?' active':'');
  });
}

      </div>
    </div>

      <button class="btn btn-sm del-btn" onclick="clearOverride()">Resetear</button>
      <button class="btn" onclick="st({modal:null,editObj:null})">Cancelar</button>
      <button class="btn btn-accent" onclick="saveOverride()">Guardar</button>

}

// Staged images for current edit session (base64)
let _stagedImgs = null;

function openEditProduct(id){
  const p=PRODUCTS_RAW.find(x=>x.id===id);
  if(p){
    _stagedImgs = [...((S.overrides[id]||{}).images||[])];
    st({modal:'product',editObj:p});
  }
}

function removeImg(idx){
  if(!_stagedImgs)return;
  _stagedImgs.splice(idx,1);
  // re-render previews without full modal re-render
  const container=document.getElementById('img-previews');
  if(container){
    container.innerHTML=_stagedImgs.map((url,i)=>`
      <div style="position:relative;display:inline-block">
        <img src="${url}" style="width:70px;height:70px;object-fit:cover;border-radius:6px;border:1px solid var(--border2)">
        <button onclick="removeImg(${i})" style="position:absolute;top:-6px;right:-6px;background:#ef4444;border:none;color:#fff;width:18px;height:18px;border-radius:50%;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center">✕</button>
      </div>
    `).join('');
  }
}

function handleImgUpload(event, pid){
  if(!_stagedImgs)_stagedImgs=[];
  const files=Array.from(event.target.files);
  const slots=5-_stagedImgs.length;
  if(slots<=0){notify('Máximo 5 imágenes por producto','error');return;}
  const toLoad=files.slice(0,slots);
  let loaded=0;
  toLoad.forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      _stagedImgs.push(e.target.result);
      loaded++;
      if(loaded===toLoad.length){
        const container=document.getElementById('img-previews');
        if(container){
          container.innerHTML=_stagedImgs.map((url,i)=>`
            <div style="position:relative;display:inline-block">
              <img src="${url}" style="width:70px;height:70px;object-fit:cover;border-radius:6px;border:1px solid var(--border2)">
              <button onclick="removeImg(${i})" style="position:absolute;top:-6px;right:-6px;background:#ef4444;border:none;color:#fff;width:18px;height:18px;border-radius:50%;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center">✕</button>
            </div>
          `).join('');
        }
        if(files.length>slots)notify(`Solo se cargaron ${slots} imagen(es) (máx. 5)`,'error');
        else notify(`${toLoad.length} imagen(es) cargada(s) ✅`);
      }
    };
    reader.readAsDataURL(file);
  });
}

function renderAdminModal(){
  const tab=S.modalTab;

    <div class="modal-header"><span class="modal-title">Panel de administración</span><button class="btn btn-sm" onclick="st({modal:null,editObj:null})">✕</button></div>
    <div class="modal-body">
      <div class="modal-tabs">
        <div class="modal-tab ${tab==='vendedores'?'active':''}" onclick="st({modalTab:'vendedores'})">👤 Vendedores</div>
        <div class="modal-tab ${tab==='exportar'?'active':''}" onclick="st({modalTab:'exportar'})">💾 Exportar</div>

    ${S.vendors.length===0?`<p style="font-size:12px;color:var(--text3);margin-bottom:12px">No hay vendedores aún.</p>`:''}

  return `<div style="font-size:13px;color:var(--text2);line-height:1.9">
    <p>📦 <strong style="color:var(--text)">${PRODUCTS_RAW.length} productos</strong> cargados</p>
    <p>✏️ Editá precio, stock e ícono tocando el lápiz en cada producto</p>
    <p>🔗 Cada vendedor tiene un link único — el botón WhatsApp va directo a su número</p>
    <p>💬 Podés poner "Consultar precio" en cualquier producto</p>

function renderExportTab(){
  const total=Object.keys(S.overrides).length;
  const withImgs=Object.values(S.overrides).filter(o=>o.images&&o.images.length>0).length;
  const withDesc=Object.values(S.overrides).filter(o=>o.description&&o.description.trim()).length;
  return `<div style="font-size:13px;color:var(--text2);line-height:1.8">
    <div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:14px;margin-bottom:16px">
      <p style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Estado actual</p>
      <p>📦 <strong style="color:var(--text)">${total}</strong> productos con datos editados</p>
      <p>📷 <strong style="color:var(--accent)">${withImgs}</strong> productos con imágenes</p>
      <p>📝 <strong style="color:var(--accent)">${withDesc}</strong> productos con descripción</p>
      <p>👤 <strong style="color:var(--text)">${S.vendors.length}</strong> vendedores registrados</p>
    </div>
    <div style="background:#1a8fff0a;border:1px solid #1a8fff22;border-radius:var(--rs);padding:12px;margin-bottom:16px;font-size:12px;line-height:1.6">
      <p style="color:var(--accent2);font-weight:600;margin-bottom:4px">¿Cómo funciona?</p>
      <p>Al exportar, se descarga un nuevo <strong style="color:var(--text)">index.html</strong> con todas las imágenes, descripciones, precios y vendedores ya guardados <strong style="color:var(--text)">dentro del código</strong>. Reemplazás el archivo anterior con este y listo — los cambios quedan permanentes.</p>
    </div>
    <button class="btn btn-accent" style="width:100%;justify-content:center;padding:11px;font-size:14px" onclick="exportCode()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Descargar index.html actualizado
    </button>
    <p style="font-size:11px;color:var(--text3);margin-top:8px;text-align:center">⚠️ Guardá todos los productos antes de exportar</p>
  </div>`;
}

function exportCode(){
  notify('Generando archivo...');
  // Get the full HTML source
  const html = document.documentElement.outerHTML;

  // Build the hardcoded overrides block to inject
  const ovJson = JSON.stringify(S.overrides);
  const vendorsJson = JSON.stringify(S.vendors);

  // Replace the init function so it loads hardcoded data instead of storage
  const initOld = `async function init(){
  const [ov,vendors]=await Promise.all([loadOv(),loadVendors()]);
  S.overrides=ov;S.vendors=vendors;
  S.screen='login';render();
}
init();`;

  const initNew = `// ── DATOS EXPORTADOS ──────────────────────────────────
const HARDCODED_OVERRIDES = ${ovJson};
const HARDCODED_VENDORS   = ${vendorsJson};
// ──────────────────────────────────────────────────────
async function init(){
  // Merge: storage takes priority so live edits still work,
  // but fall back to hardcoded data when storage is empty.
  const [storedOv, storedVendors] = await Promise.all([loadOv(), loadVendors()]);
  S.overrides = Object.keys(storedOv).length  ? storedOv      : HARDCODED_OVERRIDES;
  S.vendors   = storedVendors.length           ? storedVendors : HARDCODED_VENDORS;
  S.screen='login'; render();
}
init();`;

  const exported = html.replace(initOld, initNew);

  // Download
  const blob = new Blob([exported], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'emme-ride-catalogo.html';
  a.click();
  URL.revokeObjectURL(a.href);
  setTimeout(()=>notify('Descargado ✅'),400);
}

function toggleConsultar(){
  const cb=document.getElementById('f-consultar');
  const inp=document.getElementById('f-price');
  if(inp){inp.disabled=cb.checked;inp.style.opacity=cb.checked?'.4':'1';}
}

function openAdmin(){st({modal:'admin',modalTab:'vendedores',editObj:null});}
function closeModal(e){if(e.target.classList.contains('modal-overlay'))st({modal:null,editObj:null});}

async function saveOverride(){
  const p=S.editObj;
  const consultar=document.getElementById('f-consultar')?.checked;
  const priceVal=document.getElementById('f-price')?.value.trim();
  const inStock=document.getElementById('f-stock')?.checked;
  const emoji=document.getElementById('f-emoji')?.value.trim();
  const desc=document.getElementById('f-desc')?.value.trim();
  const images=_stagedImgs||[];
  const ov={inStock,consultar,emoji,description:desc,images};
  if(!consultar&&priceVal)ov.price=Number(priceVal);
  S.overrides[p.id]=ov;
  await saveOv(S.overrides);
  _stagedImgs=null;
  st({modal:null,editObj:null});
  notify('Guardado ✅');
}

async function clearOverride(){
  delete S.overrides[S.editObj.id];
  await saveOv(S.overrides);
  st({modal:null,editObj:null});
  notify('Reseteado al valor original');
}

async function addVendor(){
  const name=document.getElementById('v-name')?.value.trim();
  const wa=document.getElementById('v-wa')?.value.trim();
  if(!name){notify('El nombre es requerido','error');return;}
  const slug=slugify(name)+'-'+Date.now().toString(36).slice(-4);
  S.vendors.push({id:'v'+Date.now(),name,whatsapp:wa,slug});
  await saveVendors(S.vendors);
  st({modal:'admin',modalTab:'vendedores'});
  notify(`${name} agregado ✅`);
}

async function deleteVendor(id){
  if(!confirm('¿Eliminar este vendedor?'))return;
  S.vendors=S.vendors.filter(v=>v.id!==id);
  await saveVendors(S.vendors);
  render();
  notify('Eliminado','error');
}

function copySlug(slug){
  navigator.clipboard?.writeText(`?v=${slug}`).then(()=>notify('Link copiado 📋')).catch(()=>notify('?v='+slug));
}

async function init(){
  const [ov,vendors]=await Promise.all([loadOv(),loadVendors()]);
  S.overrides=ov;S.vendors=vendors;
  S.screen='login';render();
}
init();
</script>
